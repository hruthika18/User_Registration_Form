<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registered Users</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #36d1dc, #5b86e5);
      padding: 30px;
    }

    .container {
      max-width: 1400px;
      margin: auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      padding: 25px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
      font-size: 28px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 250px;
    }

    .search-box input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    .search-box input:focus {
      border-color: #36d1dc;
      box-shadow: 0 0 0 3px rgba(54, 209, 220, 0.15);
    }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    .back-btn {
      background: #36d1dc;
    }

    .back-btn:hover {
      background: #2ab6c0;
    }

    .table-scroll {
      width: 100%;
      overflow-x: auto;
      border-radius: 12px;
      margin-top: 10px;
    }

    table {
      width: 100%;
      min-width: 1300px;
      border-collapse: collapse;
      border-radius: 12px;
      overflow: hidden;
    }

    th,
    td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #36d1dc;
      color: #fff;
    }

    tr:nth-child(even) {
      background: #f8f8f8;
    }

    .action-btn {
      padding: 7px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      font-size: 13px;
      margin-right: 6px;
      margin-bottom: 5px;
    }

    .edit-btn {
      background: #27ae60;
    }

    .delete-btn {
      background: #e74c3c;
    }

    .edit-btn:hover {
      background: #1f8b4d;
    }

    .delete-btn:hover {
      background: #c0392b;
    }

    .no-users {
      text-align: center;
      padding: 25px;
      color: #666;
      font-size: 16px;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-content {
      background: #fff;
      width: 100%;
      max-width: 560px;
      max-height: 88vh;
      border-radius: 16px;
      padding: 22px 22px 0 22px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
    }

    .modal-content h3 {
      margin-bottom: 15px;
      text-align: center;
      color: #333;
      flex-shrink: 0;
    }

    .modal-fields {
      overflow-y: auto;
      padding-right: 6px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 14px;
    }

    .modal-fields .full-width {
      grid-column: 1 / -1;
    }

    .modal-content label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #444;
      font-size: 14px;
    }

    .modal-content input,
    .modal-content textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 14px;
      outline: none;
    }

    .modal-content input:focus,
    .modal-content textarea:focus {
      border-color: #36d1dc;
      box-shadow: 0 0 0 3px rgba(54, 209, 220, 0.15);
    }

    .modal-content textarea {
      resize: none;
      min-height: 70px;
    }

    .dob-box {
      position: relative;
    }

    .dob-box input[type="text"] {
      padding-right: 42px;
    }

    .calendar-btn {
      position: absolute;
      right: 12px;
      top: 13px;
      font-size: 16px;
      cursor: pointer;
      user-select: none;
      line-height: 1;
    }

    .hidden-date-input {
      position: absolute;
      opacity: 0;
      width: 1px;
      height: 1px;
      pointer-events: none;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding: 14px 0;
      flex-shrink: 0;
      background: #fff;
      border-top: 1px solid #eee;
      margin-top: 6px;
    }

    .save-btn {
      background: #36d1dc;
    }

    .save-btn:hover {
      background: #2ab6c0;
    }

    .cancel-btn {
      background: #888;
    }

    .cancel-btn:hover {
      background: #666;
    }

    @media(max-width:480px) {
      .modal-fields {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Registered Users</h2>

    <div class="top-bar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by name, username, email, phone..."
          onkeyup="filterUsers()">
      </div>
      <button class="btn back-btn" onclick="goBack()">Back to Registration</button>
    </div>

    <div id="tableContainer"></div>
  </div>

  <div class="modal" id="editModal">
    <div class="modal-content">
      <h3>Edit User</h3>

      <div class="modal-fields">
        <input type="hidden" id="edit_id">

        <div>
          <label>First Name</label>
          <input type="text" id="edit_first_name">
        </div>

        <div>
          <label>Last Name</label>
          <input type="text" id="edit_last_name">
        </div>

        <div>
          <label>Email ID</label>
          <input type="email" id="edit_email_id">
        </div>

        <div>
          <label>Username</label>
          <input type="text" id="edit_username">
        </div>

        <div>
          <label>Gender</label>
          <input type="text" id="edit_gender" placeholder="Male / Female / Others">
        </div>

        <div>
          <label>Date of Birth</label>
          <div class="dob-box">
            <input type="text" id="edit_dob" placeholder="dd/mm/yyyy" maxlength="10">
            <span class="calendar-btn" onclick="openDatePicker('edit_dob_hidden')">&#128197;</span>
            <input type="date" id="edit_dob_hidden" class="hidden-date-input">
          </div>
        </div>

        <div>
          <label>Password</label>
          <input type="text" id="edit_password">
        </div>

        <div>
          <label>Phone Number</label>
          <input type="text" id="edit_phone_num" maxlength="10">
        </div>

        <div>
          <label>Pincode</label>
          <input type="text" id="edit_pincode" maxlength="6">
        </div>

        <div class="full-width">
          <label>Address</label>
          <textarea id="edit_address"></textarea>
        </div>
      </div>

      <div class="modal-buttons">
        <button class="btn cancel-btn" onclick="closeModal()">Cancel</button>
        <button class="btn save-btn" onclick="saveEdit()">Save</button>
      </div>
    </div>
  </div>

  <script>
    function getUsers() {
      return JSON.parse(localStorage.getItem("users")) || [];
    }

    function saveUsers(users) {
      localStorage.setItem("users", JSON.stringify(users));
    }

    // Auto-insert "/" separators as the user types dd/mm/yyyy in edit modal
    document.getElementById("edit_dob").addEventListener("input", function () {
      let digits = this.value.replace(/\D/g, "").slice(0, 8);
      let formatted = digits;
      if (digits.length > 4) {
        formatted = digits.slice(0, 2) + "/" + digits.slice(2, 4) + "/" + digits.slice(4);
      } else if (digits.length > 2) {
        formatted = digits.slice(0, 2) + "/" + digits.slice(2);
      }
      this.value = formatted;
    });

    function isValidDDMMYYYY(value) {
      const match = /^(\d{2})\/(\d{2})\/(\d{4})$/.exec(value);
      if (!match) return false;

      const day = Number(match[1]);
      const month = Number(match[2]);
      const year = Number(match[3]);

      if (year < 1900 || year > new Date().getFullYear()) return false;
      if (month < 1 || month > 12) return false;

      const daysInMonth = new Date(year, month, 0).getDate();
      if (day < 1 || day > daysInMonth) return false;

      return true;
    }

    function openDatePicker(hiddenId) {
      const hidden = document.getElementById(hiddenId);
      if (hidden.showPicker) {
        hidden.showPicker();
      } else {
        hidden.focus();
        hidden.click();
      }
    }

    document.getElementById("edit_dob_hidden").addEventListener("change", function () {
      if (this.value) {
        const [y, m, d] = this.value.split("-");
        document.getElementById("edit_dob").value = `${d}/${m}/${y}`;
      }
    });

    function displayUsers(usersToShow = null) {
      const users = usersToShow || getUsers();
      const tableContainer = document.getElementById("tableContainer");

      if (users.length === 0) {
        tableContainer.innerHTML = `<div class="no-users">No registered users found.</div>`;
        return;
      }

      let table = `
        <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>S.No</th>
              <th>First Name</th>
              <th>Last Name</th>
              <th>Email ID</th>
              <th>Username</th>
              <th>Gender</th>
              <th>Date of Birth</th>
              <th>Password</th>
              <th>Phone Number</th>
              <th>Pincode</th>
              <th>Address</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
      `;

      users.forEach((user, index) => {
        table += `
          <tr>
            <td>${index + 1}</td>
            <td>${user.first_name}</td>
            <td>${user.last_name}</td>
            <td>${user.email_id}</td>
            <td>${user.username}</td>
            <td>${user.gender || ""}</td>
            <td>${user.dob || ""}</td>
            <td>${user.password}</td>
            <td>${user.phone_num}</td>
            <td>${user.pincode || ""}</td>
            <td>${user.address}</td>
            <td>
              <button class="action-btn edit-btn" onclick="editUser(${user.id})">Edit</button>
              <button class="action-btn delete-btn" onclick="deleteUser(${user.id})">Delete</button>
            </td>
          </tr>
        `;
      });

      table += `</tbody></table></div>`;
      tableContainer.innerHTML = table;
    }

    function filterUsers() {
      const search = document.getElementById("searchInput").value.toLowerCase();
      const users = getUsers();

      const filtered = users.filter(user =>
        user.first_name.toLowerCase().includes(search) ||
        user.last_name.toLowerCase().includes(search) ||
        user.email_id.toLowerCase().includes(search) ||
        user.username.toLowerCase().includes(search) ||
        (user.gender || "").toLowerCase().includes(search) ||
        user.phone_num.toLowerCase().includes(search) ||
        (user.pincode || "").toLowerCase().includes(search) ||
        user.address.toLowerCase().includes(search)
      );

      displayUsers(filtered);
    }

    function deleteUser(id) {
      if (confirm("Are you sure you want to delete this user?")) {
        let users = getUsers();
        users = users.filter(user => user.id !== id);
        saveUsers(users);
        displayUsers();
      }
    }

    function editUser(id) {
      const users = getUsers();
      const user = users.find(u => u.id === id);

      if (!user) return;

      document.getElementById("edit_id").value = user.id;
      document.getElementById("edit_first_name").value = user.first_name;
      document.getElementById("edit_last_name").value = user.last_name;
      document.getElementById("edit_email_id").value = user.email_id;
      document.getElementById("edit_username").value = user.username;
      document.getElementById("edit_gender").value = user.gender || "";
      document.getElementById("edit_dob").value = user.dob || "";
      document.getElementById("edit_password").value = user.password;
      document.getElementById("edit_phone_num").value = user.phone_num;
      document.getElementById("edit_pincode").value = user.pincode || "";
      document.getElementById("edit_address").value = user.address;

      document.getElementById("editModal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("editModal").style.display = "none";
    }

    function saveEdit() {
      const id = Number(document.getElementById("edit_id").value);
      const first_name = document.getElementById("edit_first_name").value.trim();
      const last_name = document.getElementById("edit_last_name").value.trim();
      const email_id = document.getElementById("edit_email_id").value.trim();
      const username = document.getElementById("edit_username").value.trim();
      const gender = document.getElementById("edit_gender").value.trim();
      const dob = document.getElementById("edit_dob").value;
      const password = document.getElementById("edit_password").value.trim();
      const phone_num = document.getElementById("edit_phone_num").value.trim();
      const pincode = document.getElementById("edit_pincode").value.trim();
      const address = document.getElementById("edit_address").value.trim();

      if (first_name === "" || last_name === "" || email_id === "" || username === "" || password === "" || phone_num === "" || pincode === "" || address === "") {
        alert("Please fill all fields");
        return;
      }

      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailPattern.test(email_id)) {
        alert("Enter a valid email address");
        return;
      }

      if (!/^[0-9]{10}$/.test(phone_num)) {
        alert("Phone number must be exactly 10 digits");
        return;
      }

      if (!/^[0-9]{6}$/.test(pincode)) {
        alert("Pincode must be exactly 6 digits");
        return;
      }

      if (dob !== "" && !isValidDDMMYYYY(dob)) {
        alert("Enter a valid Date of Birth (dd/mm/yyyy)");
        return;
      }

      let users = getUsers();
      const index = users.findIndex(user => user.id === id);

      if (index !== -1) {
        users[index].first_name = first_name;
        users[index].last_name = last_name;
        users[index].email_id = email_id;
        users[index].username = username;
        users[index].gender = gender;
        users[index].dob = dob;
        users[index].password = password;
        users[index].phone_num = phone_num;
        users[index].pincode = pincode;
        users[index].address = address;
      }

      saveUsers(users);
      closeModal();
      displayUsers();
    }

    function goBack() {
      window.location.href = "index.html";
    }

    displayUsers();
  </script>

</body>

</html>
